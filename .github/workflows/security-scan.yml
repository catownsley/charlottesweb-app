name: Security Scan (PR Quick)

on:
  pull_request:
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  codeql:
    name: CodeQL (Quick)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:python

  bandit:
    name: Bandit (Quick SAST)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install Bandit
        run: |
          python -m pip install --upgrade pip
          pip install "bandit[sarif]"

      - name: Run Bandit
        run: |
          bandit -r src -f sarif -o bandit-results.sarif

      - name: Upload Bandit SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: bandit-results.sarif
          category: bandit

  pip-audit:
    name: Dependency Vulnerabilities (pip-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit

      - name: Scan dependencies for vulnerabilities
        run: |
          pip-audit -r requirements.txt --desc --ignore-vuln CVE-2026-4539  # pygments: no fix available, local-access-only regex complexity

      - name: Verify dependency integrity (hash check)
        run: |
          pip install --no-deps --require-hashes --dry-run -r requirements.lock

  lock-sync:
    name: Lock File Sync
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install pip-tools
        run: |
          python -m pip install --upgrade pip
          pip install pip-tools

      - name: Verify requirements.lock matches requirements.txt
        run: |
          pip-compile --generate-hashes --output-file=requirements.lock.fresh requirements.txt
          if ! diff -q requirements.lock requirements.lock.fresh > /dev/null; then
            echo "::error::requirements.lock is out of sync with requirements.txt"
            echo ""
            echo "To fix locally:"
            echo "  pip install pip-tools"
            echo "  pip-compile --generate-hashes --output-file=requirements.lock requirements.txt"
            echo "  git add requirements.lock && git commit"
            echo ""
            echo "Diff:"
            diff requirements.lock requirements.lock.fresh || true
            exit 1
          fi
          echo "Lock file in sync"
