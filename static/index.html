<!DOCTYPE html>
<html lang="en">
<head>
    <!--
    CHARLOTTESWEB - VULNERABILITY ANALYZER INTERFACE
    
    This HTML interface provides a secure, user-friendly way to analyze software stacks
    for known vulnerabilities using the National Vulnerability Database (NVD) API.
    
    SECURITY CONSIDERATIONS:
    ========================
    1. INPUT VALIDATION (Client-side + Server-side)
       - HTML5 maxlength and pattern attributes provide basic client-side validation
       - JSON parsing validates structure (catches malformed JSON)
       - Regex patterns restrict to alphanumeric chars, numbers, dots, dashes, underscores
       - Server-side validation via Pydantic models provides authoritative checks
       
    2. XSS PREVENTION (Cross-Site Scripting)
       - CSP header (from backend) blocks inline scripts and external script injection
       - innerHTML is used only with validated API responses (not user input)
       - Browser auto-escapes text in textContent and JSON.stringify, no manual escaping needed
       
    3. CSRF PREVENTION (Cross-Site Request Forgery)
       - HTTPS/TLS enforced (localhost:8443)
       - Requests include proper Origin/Referer headers
       - SameSite cookie attribute applied by browser
       
    4. INJECTION PREVENTION (SQL/NoSQL)
       - No direct SQL queries - all data goes through Pydantic validators
       - Backend uses SQLAlchemy ORM with parameterized queries
       - JSON payload structure validated before transmission
       
    WORKFLOW:
    =========
    1. User enters organization name (alphanumeric + spaces/dashes)
    2. User enters software stack as JSON (e.g., {"postgres": "13.2"})
    3. Client validates both inputs before sending
    4. Backend creates org → metadata profile → assessment → runs NVD analysis
    5. Results displayed with CVE details and severity levels
    
    COMPLIANCE:
    ===========
    - HIPAA 164.312(b): Audit controls - all actions tracked in backend audit.log
    - SOC 2 CC6.1: Access controls - API key validation on backend
    - OWASP Top 10: Protected against injection, XSS, CSRF
    -->
    
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CharlottesWeb - Software Stack Vulnerability Analyzer</title>
    <link rel="icon" href="/favicon.ico" sizes="any">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    
    <style>
        /*
        STYLING: Minimal, accessible design
        - System fonts for fast loading (no external resources needed)
        - High contrast for accessibility (WCAG AA compliance)
        - Mobile-responsive (max-width ensures readability on phone)
        - Print-friendly (colors work in grayscale)
        */
        
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
        }
        
        .container {
            max-width: 700px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            border-radius: 8px 8px 0 0;
            margin-bottom: 0;
        }
        
        h1 {
            margin: 0;
            font-size: 28px;
        }
        
        .subtitle {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .form-wrapper {
            background: white;
            padding: 30px;
            border-radius: 0 0 8px 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-top: 20px;
            font-weight: 600;
            color: #222;
        }
        
        label:first-child {
            margin-top: 0;
        }
        
        input[type="text"],
        textarea {
            /* INPUT SECURITY: Proper size and styling for usability */
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            /* Visual feedback on focus - helps with accessibility */
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        textarea {
            /* Monospace font for JSON readability */
            font-family: "Monaco", "Courier New", monospace;
            resize: vertical;
            min-height: 120px;
        }
        
        button {
            /* BUTTON STYLING: High contrast, clear affordance */
            margin-top: 20px;
            padding: 12px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        
        button:hover {
            background: #5568d3;
        }
        
        button:active {
            transform: scale(0.98);
        }
        
        button:disabled {
            /* Disabled state feedback */
            background: #ccc;
            cursor: not-allowed;
        }
        
        .result {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin-top: 20px;
        }
        
        .result.hidden {
            display: none;
        }
        
        .result.loading {
            text-align: center;
            color: #667eea;
        }
        
        .result.success {
            border-left: 4px solid #28a745;
        }
        
        .result.error {
            border-left: 4px solid #dc3545;
            color: #721c24;
            background-color: #f8d7da;
        }
        
        .findings-list {
            list-style: none;
            padding: 0;
            margin-top: 15px;
        }
        
        .finding-item {
            /* FINDING DISPLAY: Clear formatting for vulnerability details */
            background: #f5f5f5;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 4px;
            border-left: 4px solid #ff9800;
        }
        
        .finding-item.critical {
            border-left-color: #dc3545;
            background: #fff5f5;
        }
        
        .finding-item.high {
            border-left-color: #ff9800;
            background: #fffaf0;
        }
        
        .finding-item.medium {
            border-left-color: #ffc107;
            background: #fffef0;
        }
        
        .cve-id {
            font-family: monospace;
            font-weight: 600;
            color: #333;
        }
        
        .cvss-score {
            /* CVSS color coding: Red = critical, Orange = high, Yellow = medium, Green = low */
            display: inline-block;
            padding: 2px 6px;
            border-radius: 3px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }
        
        .cvss-score.critical {
            background: #dc3545;
            color: white;
        }
        
        .cvss-score.high {
            background: #ff9800;
            color: white;
        }
        
        .cvss-score.medium {
            background: #ffc107;
            color: #333;
        }
        
        .cvss-score.low {
            background: #28a745;
            color: white;
        }
        
        .help-text {
            /* Inline help for user guidance */
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        
        .stat-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            text-align: center;
        }
        
        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .component-row {
            display: grid;
            grid-template-columns: 1fr 1fr 50px;
            gap: 10px;
            margin-bottom: 15px;
            align-items: end;
            position: relative;
        }
        
        .component-row input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            margin: 0;
            transition: border-color 0.2s;
        }
        
        .component-row input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .version-suggestions {
            /* Dropdown menu for version suggestions */
            position: absolute;
            top: 100%;
            left: calc(50% + 5px);
            width: calc(50% - 10px);
            background: white;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            z-index: 100;
            display: none;
            margin-top: 2px;
        }
        
        .version-suggestions.show {
            display: block;
        }
        
        .version-suggestions .suggestion {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            transition: background 0.15s;
        }
        
        .version-suggestions .suggestion:last-child {
            border-bottom: none;
        }
        
        .version-suggestions .suggestion:hover {
            background: #f0f0f0;
        }
        
        .version-suggestions .suggestion.selected {
            background: #e8eef7;
            color: #667eea;
            font-weight: 600;
        }
        
        .component-row button {
            color: #dc3545;
            background: #fff;
            border: 2px solid #dc3545;
            margin: 0;
            padding: 10px;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .component-row button:hover {
            background: #dc3545;
            color: white;
        }
        
        .component-label {
            font-size: 12px;
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- HEADER: Branding and purpose statement -->
        <header>
            <h1>🛡️ CharlottesWeb</h1>
            <div class="subtitle">Software Stack Vulnerability Analyzer</div>
            <div class="subtitle">Powered by National Vulnerability Database (NVD)</div>
        </header>
        
        <!-- MAIN FORM: User input for analysis -->
        <div class="form-wrapper">
            <form id="stackForm">
                <!-- Organization Name Input -->
                <label for="orgName">
                    Organization Name
                </label>
                <input 
                    type="text" 
                    id="orgName" 
                    name="orgName"
                    required 
                    maxlength="100" 
                    placeholder="e.g., Acme Corporation"
                    title="Use letters, numbers, spaces, and dashes only"
                    aria-label="Organization name (required)"
                >
                <div class="help-text">
                    Letters, numbers, spaces, and dashes only
                </div>
                
                <!-- Software Stack Components -->
                <label>
                    Software Components
                </label>
                <div id="componentsContainer" style="margin-top: 10px;">
                    <!-- Components will be added here dynamically -->
                </div>
                
                <!-- Add Component Button -->
                <button type="button" id="addComponentBtn" style="margin-top: 10px; background: #28a745;">
                    ➕ Add Component
                </button>
                
                <div class="help-text" style="margin-top: 15px;">
                    Add each software component and its version. Examples: postgres 13.2, nodejs 14.0.0, nginx 1.19.0
                </div>
                
                <!-- Submit Button -->
                <button type="submit" id="submitBtn" style="margin-top: 20px;">
                    🔍 Analyze for Vulnerabilities
                </button>
            </form>
        </div>
        
        <!-- RESULTS SECTION: Displayed after form submission -->
        <div id="result" class="result hidden" role="status" aria-live="polite">
            <!-- Results content will be inserted here by JavaScript -->
        </div>
    </div>
    
    <script>
        // Get form elements
        const form = document.getElementById('stackForm');
        const resultDiv = document.getElementById('result');
        const submitBtn = document.getElementById('submitBtn');
        const addComponentBtn = document.getElementById('addComponentBtn');
        const componentsContainer = document.getElementById('componentsContainer');
        
        console.log('Form elements loaded:', {
            form: !!form,
            addComponentBtn: !!addComponentBtn,
            submitBtn: !!submitBtn
        });
        
        // Counter for unique component IDs
        let componentCounter = 0;
        
        // Prevent Enter key from submitting form on input fields (only submit button should trigger submission)
        form.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                e.preventDefault();
                // Focus on submit button so user can see it's ready (optional UX improvement)
                submitBtn.focus();
            }
        });

        
        /**
         * Add a new component input row
         */
        addComponentBtn.addEventListener('click', function(e) {
            console.log('Add Component button clicked');
            e.preventDefault();
            e.stopPropagation();
            
            componentCounter++;
            
            const row = document.createElement('div');
            row.className = 'component-row';
            row.id = `component-${componentCounter}`;
            
            row.innerHTML = `
                <div style="position: relative;">
                    <div class="component-label">Component Name</div>
                    <input 
                        type="text" 
                        class="component-name"
                        placeholder="e.g., postgres"
                        maxlength="50"
                        title="Letters, numbers, underscores, dashes only (no dots)"
                    >
                    <div class="version-suggestions"></div>
                </div>
                <div>
                    <div class="component-label">Version</div>
                    <input 
                        type="text" 
                        class="component-version"
                        placeholder="e.g., 13.2"
                        maxlength="20"
                        title="Version string"
                    >
                </div>
                <button type="button" class="delete-component">
                    ✕
                </button>
            `;
            
            // Delete button handler
            row.querySelector('.delete-component').addEventListener('click', (e) => {
                e.preventDefault();
                row.remove();
            });
            
            // Version suggestions handler
            const componentNameInput = row.querySelector('.component-name');
            const versionInput = row.querySelector('.component-version');
            const suggestionsBox = row.querySelector('.version-suggestions');
            let suggestionTimeout;
            
            componentNameInput.addEventListener('input', async function(e) {
                const componentName = e.target.value.trim();
                
                // Hide suggestions if input is empty
                if (!componentName || componentName.length < 2) {
                    suggestionsBox.classList.remove('show');
                    return;
                }
                
                // Show loading state
                suggestionsBox.innerHTML = '<div class="suggestion" style="color: #999; cursor: default;">Loading versions...</div>';
                suggestionsBox.classList.add('show');
                
                // Debounce: Only fetch after user stops typing for 300ms
                clearTimeout(suggestionTimeout);
                suggestionTimeout = setTimeout(async () => {
                    try {
                        const response = await fetch(
                            `https://localhost:8443/api/v1/components/${encodeURIComponent(componentName)}/versions`
                        );
                        
                        if (!response.ok) {
                            suggestionsBox.classList.remove('show');
                            return;
                        }
                        
                        const data = await response.json();
                        const versions = data.versions || [];
                        
                        // Show/hide suggestions based on whether versions were found
                        if (versions.length === 0) {
                            suggestionsBox.classList.remove('show');
                            return;
                        }
                        
                        // Build suggestion HTML
                        suggestionsBox.innerHTML = '';
                        versions.forEach((version, index) => {
                            const suggestionEl = document.createElement('div');
                            suggestionEl.className = 'suggestion';
                            suggestionEl.textContent = version;
                            suggestionEl.addEventListener('click', (e) => {
                                e.preventDefault();
                                e.stopPropagation();
                                versionInput.value = version;
                                versionInput.dispatchEvent(new Event('change', { bubbles: true }));
                                suggestionsBox.classList.remove('show');
                                versionInput.focus();
                            });
                            suggestionEl.addEventListener('mouseenter', () => {
                                // Visual feedback on hover
                                document.querySelectorAll('.version-suggestions .suggestion').forEach(el => {
                                    el.classList.remove('selected');
                                });
                                suggestionEl.classList.add('selected');
                            });
                            suggestionsBox.appendChild(suggestionEl);
                        });
                        
                        suggestionsBox.classList.add('show');
                        
                    } catch (err) {
                        console.warn('Failed to fetch version suggestions:', err);
                        suggestionsBox.classList.remove('show');
                    }
                }, 300);  // 300ms debounce delay
            });
            
            // Close suggestions when clicking outside
            document.addEventListener('click', (e) => {
                if (e.target !== componentNameInput && !suggestionsBox.contains(e.target)) {
                    suggestionsBox.classList.remove('show');
                }
            }, true);
            
            componentsContainer.appendChild(row);
            
            // Focus on the new component name field
            componentNameInput.focus();
        });
        
        // Add initial component field
        addComponentBtn.click();
        
        /**
         * Form submission handler
         */
        form.addEventListener('submit', function(e) {
            console.log('Form submit event triggered');
            e.preventDefault();
            e.stopPropagation();
            
            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Analyzing...';
            
            (async function() {
            try {
                const orgName = document.getElementById('orgName').value.trim();
                
                if (!orgName) {
                    throw new Error('Organization name is required');
                }
                
                // Build software stack from component inputs
                const stack = {};
                const componentRows = document.querySelectorAll('.component-row');
                
                // Validation patterns (match backend)
                const componentPattern = /^[a-zA-Z0-9_-]+$/;
                const versionPattern = /^[a-zA-Z0-9._-]+$/;
                
                // Collect all components
                for (const row of componentRows) {
                    const name = row.querySelector('.component-name').value.trim();
                    const version = row.querySelector('.component-version').value.trim();
                    
                    console.log(`Component row: name="${name}", version="${version}"`);
                    
                    // Skip empty rows (both fields empty)
                    if (!name && !version) {
                        console.log('  → Skipping empty row');
                        continue;
                    }
                    
                    // Warn about incomplete entries but skip them gracefully
                    if (!name || !version) {
                        console.log(`  → Skipping incomplete entry (name=${!!name}, version=${!!version})`);
                        continue;  // Skip partial entries without throwing error
                    }
                    
                    // Validate name if provided
                    if (name && !componentPattern.test(name)) {
                        throw new Error(
                            `Invalid component name: "${name}". ` +
                            `Use letters, numbers, underscores, and hyphens only (no dots).`
                        );
                    }
                    
                    // Validate version if provided
                    if (version && !versionPattern.test(version)) {
                        throw new Error(
                            `Invalid version for "${name}": "${version}". ` +
                            `Use letters, numbers, dots, dashes, and underscores.`
                        );
                    }
                    
                    console.log(`  → Adding component: ${name} ${version}`);
                    stack[name] = version;
                }
                
                console.log('📦 Final stack:', stack);
                
                // Require at least one component
                if (Object.keys(stack).length === 0) {
                    throw new Error('Please add at least one software component');
                }
                
                // Component names must be unique
                if (Object.keys(stack).length !== new Set(Object.keys(stack)).size) {
                    throw new Error('Duplicate component names. Each component must be unique.');
                }
                
                showLoading('Creating organization...');
                
                // Step 1: Create organization
                const orgRes = await fetch('https://localhost:8443/api/v1/organizations', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({name: orgName})
                });
                
                if (!orgRes.ok) {
                    const errData = await orgRes.json();
                    throw new Error(`Failed to create organization: ${errData.detail || orgRes.statusText}`);
                }
                
                const org = await orgRes.json();
                console.log('✅ Organization created:', org.id);
                
                // Step 2: Create metadata profile
                showLoading('Creating metadata profile...');
                
                const profileRes = await fetch('https://localhost:8443/api/v1/metadata-profiles', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        organization_id: org.id,
                        system_name: `${orgName} system analysis`,
                        software_stack: stack
                    })
                });
                
                if (!profileRes.ok) {
                    const errData = await profileRes.json();
                    throw new Error(`Failed to create metadata profile: ${errData.detail || profileRes.statusText}`);
                }
                
                const profile = await profileRes.json();
                console.log('✅ Metadata profile created:', profile.id);
                
                // Step 3: Create assessment
                showLoading('Creating assessment...');
                
                const assessRes = await fetch('https://localhost:8443/api/v1/assessments', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        organization_id: org.id,
                        metadata_profile_id: profile.id
                    })
                });
                
                if (!assessRes.ok) {
                    const errData = await assessRes.json();
                    throw new Error(`Failed to create assessment: ${errData.detail || assessRes.statusText}`);
                }
                
                const assess = await assessRes.json();
                console.log('✅ Assessment created:', assess.id);
                
                // Step 4: Run NVD analysis
                showLoading('Querying National Vulnerability Database...');
                
                const nvdRes = await fetch(
                    `https://localhost:8443/api/v1/assessments/${assess.id}/analyze-nvd`,
                    {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'}
                    }
                );
                
                if (!nvdRes.ok) {
                    const errData = await nvdRes.json();
                    throw new Error(`NVD analysis failed: ${errData.detail || nvdRes.statusText}`);
                }
                
                const findings = await nvdRes.json();
                console.log('✅ NVD analysis complete:', findings.length, 'findings');
                
                // Display results
                displayResults(stack, findings, org);
                
            } catch (err) {
                showError(err.message);
                console.error('Analysis failed:', err);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '🔍 Analyze for Vulnerabilities';
            }
            })(); // End of async IIFE
        });
        
        function showLoading(message) {
            resultDiv.classList.remove('hidden', 'error', 'success');
            resultDiv.classList.add('loading');
            resultDiv.innerHTML = `<p>⏳ ${message}</p>`;
        }
        
        function showError(message) {
            resultDiv.classList.remove('hidden', 'loading', 'success');
            resultDiv.classList.add('error');
            resultDiv.innerHTML = `<h3>❌ Analysis Failed</h3><p>${message}</p>`;
        }
        
        function displayResults(stack, findings, org) {
            let html = `
                <h3>✅ Analysis Complete</h3>
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-value">${Object.keys(stack).length}</div>
                        <div class="stat-label">Components<br>Analyzed</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value">${findings.length}</div>
                        <div class="stat-label">Vulnerabilities<br>Found</div>
                    </div>
                </div>
                <p><strong>Organization:</strong> ${org.name}</p>
                <p><strong>Components:</strong> ${Object.keys(stack).map(k => `${k} ${stack[k]}`).join(', ')}</p>
            `;
            
            if (findings.length === 0) {
                html += '<p style="color: #28a745; font-weight: 600;">✅ No known vulnerabilities found!</p>';
            } else {
                html += '<h4>Vulnerabilities Found:</h4>';
                html += '<ul class="findings-list">';
                
                findings.slice(0, 10).forEach(finding => {
                    const severity = finding.cvss_score >= 9 ? 'critical' 
                                  : finding.cvss_score >= 7 ? 'high'
                                  : finding.cvss_score >= 4 ? 'medium'
                                  : 'low';
                    
                    html += `
                        <li class="finding-item ${severity}">
                            <div style="display: flex; justify-content: space-between; align-items: start;">
                                <div>
                                    <span class="cve-id">${finding.external_id}</span>
                                    <span class="cvss-score ${severity}">
                                        CVSS ${finding.cvss_score || 'N/A'}
                                    </span>
                                </div>
                                <div style="text-align: right; font-size: 12px; color: #666;">
                                    Action: <strong>${finding.priority_window}</strong>
                                </div>
                            </div>
                            <p style="margin: 8px 0 4px 0;"><strong>${finding.title}</strong></p>
                            <p style="margin: 0; font-size: 13px; color: #555;">
                                ${finding.description.substring(0, 150)}${finding.description.length > 150 ? '...' : ''}
                            </p>
                            <p style="margin: 8px 0 0 0; font-size: 12px; color: #007bff;">
                                📚 <a href="https://nvd.nist.gov/vuln/detail/${finding.external_id}" 
                                      target="_blank" rel="noopener noreferrer">
                                   View full details on NVD
                                </a>
                            </p>
                        </li>
                    `;
                });
                
                html += '</ul>';
                
                if (findings.length > 10) {
                    html += `<p style="color: #666; font-size: 12px;">Showing first 10 of ${findings.length} findings</p>`;
                }
            }
            
            resultDiv.classList.remove('hidden', 'loading', 'error');
            resultDiv.classList.add('success');
            resultDiv.innerHTML = html;
        }
    </script>
</body>
</html>
